    <style>
        /* ===== BASE & PREVIOUS STYLES (Mantenidos) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Inter', sans-serif; color: #fff; line-height: 1.6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
        .hero { text-align: center; margin-bottom: 2rem; padding: 2rem 0; border-bottom: 1px solid #ffffff20; }
        .logo-image { max-width: 80%; height: auto; margin: 0 auto 1rem; display: block; }
        
        .nav-menu { display: flex; justify-content: center; gap: 2rem; margin: 1rem 0 2rem; flex-wrap: wrap; }
        .nav-item { color: #ffffff80; text-decoration: none; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; position: relative; transition: all 0.3s ease; }
        .nav-item:hover, .nav-item.active { color: white; }
        .nav-item::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: white; transition: width 0.3s ease; }
        .nav-item:hover::after, .nav-item.active::after { width: 100%; }

        .main-content { display: flex; flex-direction: column; gap: 2.5rem; }
        .card { background: #0a0a0a; padding: 2rem; border: 1px solid #ffffff05; position: relative; }
        .card h2 { font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid #ffffff15; display: flex; align-items: center; gap: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .card h2 i { opacity: 0.6; }

        /* ===== YOUTUBE & EVENTO STYLES (Mantenidos) ===== */
        .video-thumbnail-link { display: block; position: relative; overflow: hidden; }
        .video-thumbnail { aspect-ratio: 16/9; transition: transform 0.3s ease; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
        .play-overlay i { font-size: 3rem; color: #ff0000; }
        .video-info { padding: 1rem; background: #080808; margin-top: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        
        .evento-card { border: 1px solid #ffffff15; background: #050505; }
        .evento-contenido { padding: 1.5rem; }
        .evento-artista-tag { background: #ffffff10; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; color: #ffffff70; }

        /* ===== NUEVOS ESTILOS SPOTIFY ===== */
        .spotify-card {
            border: 1px solid #1db95420; /* Borde verde muy sutil */
            transition: border-color 0.4s ease;
        }

        .spotify-card:hover {
            border-color: #1db95450;
        }

        .spotify-card h2 i {
            color: #1DB954; /* Icono verde Spotify */
            opacity: 1;
        }

        .spotify-embed-container {
            border-radius: 12px;
            overflow: hidden;
            background: #121212;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .spotify-embed-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(29, 185, 84, 0.15);
        }

        .spotify-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .spotify-mini-item {
            border-radius: 12px;
            overflow: hidden;
            height: 152px;
            background: #181818;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .spotify-mini-item:hover {
            transform: scale(1.02);
            border-color: #1db95440;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        /* Botón estilo Spotify */
        .btn-spotify {
            background: #1DB954;
            color: #000 !important;
            border: none !important;
            border-radius: 50px;
            padding: 1rem 2.5rem !important;
            font-weight: 800 !important;
            letter-spacing: 0.05em !important;
        }

        .btn-spotify:hover {
            background: #1ed760;
            transform: scale(1.05);
        }

        .btn-spotify:active {
            transform: scale(0.95) !important;
        }

        /* ===== BOTONES & FOOTER ===== */
        .btn-tactile { display: inline-flex; align-items: center; justify-content: center; gap: 0.8rem; padding: 1rem 2rem; border: 2px solid #fff; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; text-decoration: none; transition: all 0.2s ease; }
        .btn-tactile:active { transform: scale(0.97); background: white; color: black; }
        .btn-group-tactile { display: flex; justify-content: center; gap: 1.5rem; margin: 3rem 0; flex-wrap: wrap; }
        
        footer { text-align: center; margin-top: 4rem; padding: 3rem 0; border-top: 1px solid #ffffff10; color: #ffffff40; }
        .divider { margin: 2rem 0; height: 1px; background: #ffffff10; }

        @media (max-width: 768px) {
            .spotify-grid { grid-template-columns: 1fr; }
            .card { padding: 1.2rem; }
        }
    </style>
</head>
