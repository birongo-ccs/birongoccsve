<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>BIRONGO · CONTACTO</title>
    
    <!-- FONTS & ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/png" sizes="512x512" href="favicon/Favicon_birongo_live_caracas_venezuela.png">
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            line-height: 1.6;
            font-size: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 0%, transparent 30%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            .container {
                padding: 2rem;
            }
        }

        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
        }

        /* ===== HEADER ===== */
        .hero {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem 0;
            border-bottom: 1px solid #ffffff20;
        }

        @media (min-width: 768px) {
            .hero {
                margin-bottom: 4rem;
                padding: 3rem 0;
            }
        }

        .logo-image {
            max-width: 80%;
            height: auto;
            margin: 0 auto 1rem;
            display: block;
        }

        @media (min-width: 768px) {
            .logo-image {
                max-width: 60%;
            }
        }

        @media (min-width: 992px) {
            .logo-image {
                max-width: 50%;
            }
        }

        .tagline {
            font-size: 0.9rem;
            color: #ffffff80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .tagline {
                font-size: 1.2rem;
            }
        }

        .tagline i {
            color: white;
            opacity: 0.5;
        }

        /* ===== MENÚ DE NAVEGACIÓN MEJORADO ===== */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0 3rem;
            flex-wrap: wrap;
            padding: 0.5rem 0;
        }

        .nav-item {
            color: #ffffff80;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 0.5rem 0;
            position: relative;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: white;
            transition: width 0.3s ease;
        }

        .nav-item:hover {
            color: white;
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .nav-item.active {
            color: white;
        }

        .nav-item.active::after {
            width: 100%;
        }

        @media (max-width: 768px) {
            .nav-menu {
                gap: 1.2rem;
                padding: 0.3rem 0;
                margin: 0.5rem 0 2rem;
            }
            
            .nav-item {
                font-size: 0.85rem;
                letter-spacing: 0.15em;
                padding: 0.4rem 0;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                gap: 0.8rem;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .nav-item {
                font-size: 0.75rem;
                letter-spacing: 0.1em;
                padding: 0.3rem 0.3rem;
                white-space: normal;
                text-align: center;
                min-width: 70px;
            }
        }

        /* ===== TARJETA DE CONTACTO ===== */
        .contacto-card {
            max-width: 700px;
            margin: 2rem auto 4rem;
            background: linear-gradient(145deg, #111, #0a0a0a);
            border: 2px solid #ffffff30;
            padding: 2.5rem;
            transition: all 0.4s ease;
        }

        .contacto-card:hover {
            border-color: #ffffff60;
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -20px rgba(255,255,255,0.2);
        }

        .contacto-icon {
            text-align: center;
            font-size: 3rem;
            color: #ffffff40;
            margin-bottom: 1.5rem;
        }

        .contacto-card h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .contacto-subtitle {
            text-align: center;
            color: #ffffff80;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* ===== FORMULARIO ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.8rem;
            color: #ffffff80;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: #1a1a1a;
            border: 1px solid #ffffff30;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: white;
            background: #222;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* ===== BOTONES TÁCTILES ===== */
        .btn-tactile {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1rem 2rem;
            border: 2px solid #fff;
            background: transparent;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
        }

        .btn-tactile:active {
            transform: scale(0.97);
            background: white;
            color: black;
            box-shadow: 0 2px 4px rgba(255,255,255,0.2);
        }

        .btn-tactile.btn-primary {
            background: white;
            color: black;
        }

        .btn-tactile.btn-primary:active {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        @media (max-width: 600px) {
            .btn-tactile {
                padding: 1.2rem 1.5rem;
                font-size: 0.8rem;
            }
        }

        /* ===== MENSAJES ===== */
        .mensaje-exito {
            background: #1DB95420;
            border: 1px solid #1DB954;
            color: #1DB954;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        .mensaje-error {
            background: #ff000020;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 1rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 3rem 0 2rem;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .nav-links {
                margin: 2rem 0 1rem;
            }
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem 0 1rem;
            border-top: 1px solid #ffffff20;
            color: #ffffff40;
            font-size: 0.8rem;
        }

        @media (min-width: 768px) {
            footer {
                margin-top: 5rem;
            }
        }

        footer i {
            color: #ffffff60;
            margin: 0 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== HEADER ===== -->
        <div class="hero">
            <img src="img/Logo birongo.jpg" alt="BIRONGO" class="logo-image">
            <div class="tagline">
                <i class="fas fa-headphones-alt"></i>
                <span> DJs · PRODUCTORES · EVENTO · MÚSICA ELECTRONICA · CARACAS · VENEZUELA </span>
                <i class="fas fa-sliders-h"></i>
            </div>
            
            <!-- ===== MENÚ DE NAVEGACIÓN ===== -->
            <div class="nav-menu">
                <a href="index.html" class="nav-item">INICIO</a>
                <a href="eventos.html" class="nav-item">EVENTOS</a>
                <a href="djs-productores.html" class="nav-item">DJs & PRODUCTORES</a>
                <a href="entradas.html" class="nav-item">ENTRADAS</a>
                <a href="contacto.html" class="nav-item active">CONTACTO</a>
            </div>
        </div>

        <!-- ===== TARJETA DE CONTACTO ===== -->
        <div class="contacto-card">
            <div class="contacto-icon">
                <i class="fas fa-envelope"></i>
            </div>
            <h2>CONTACTO</h2>
            <div class="contacto-subtitle">
                Escríbenos y te responderemos lo antes posible
            </div>

            <!-- Mensaje de éxito/error -->
            <div id="mensajeFormulario" style="display: none;"></div>

<!-- FORMULARIO -->
<form id="formContacto" action="https://formspree.io/f/xovnvjyv" method="POST">
    <div class="form-group">
        <label for="nombre">NOMBRE</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
    </div>
    <div class="form-group">
        <label for="apellido">APELLIDO</label>
        <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido">
    </div>
    <div class="form-group">
        <label for="email">EMAIL</label>
        <input type="email" id="email" name="email" required placeholder="tucorreo@ejemplo.com">
    </div>
    <div class="form-group">
        <label for="mensaje">MENSAJE</label>
        <textarea id="mensaje" name="mensaje" required placeholder="Escribe tu mensaje aquí..."></textarea>
    </div>
    <button type="submit" class="btn-tactile btn-primary" id="btnEnviar">
        <i class="fas fa-paper-plane"></i> ENVIAR MENSAJE
    </button>
</form>
        </div>

        <!-- ===== BOTÓN DE NAVEGACIÓN ===== -->
        <div class="nav-links">
            <a href="index.html" class="btn-tactile">
                <i class="fas fa-arrow-left"></i> VOLVER AL INICIO
            </a>
        </div>

        <!-- ===== FOOTER ===== -->
        <footer>
            <p><i class="fas fa-bolt"></i> BIRONGO · CARACAS · 2025 <i class="fas fa-bolt"></i></p>
        </footer>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formContacto');
            const mensajeDiv = document.getElementById('mensajeFormulario');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Mostrar mensaje de carga
                const btn = document.getElementById('btnEnviar');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ENVIANDO...';
                btn.disabled = true;
                
                try {
                    const formData = new FormData(form);
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        // Éxito
                        mensajeDiv.style.display = 'block';
                        mensajeDiv.className = 'mensaje-exito';
                        mensajeDiv.innerHTML = '<i class="fas fa-check-circle"></i> ¡Mensaje enviado con éxito! Te responderemos pronto.';
                        form.reset();
                    } else {
                        throw new Error('Error en el envío');
                    }
                } catch (error) {
                    // Error
                    mensajeDiv.style.display = 'block';
                    mensajeDiv.className = 'mensaje-error';
                    mensajeDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error al enviar. Por favor, inténtalo de nuevo.';
                } finally {
                    // Restaurar botón
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    
                    // Ocultar mensaje después de 5 segundos
                    setTimeout(() => {
                        mensajeDiv.style.display = 'none';
                    }, 5000);
                }
            });
            
            // Seguridad para enlaces externos
            document.querySelectorAll('a[href^="http"]').forEach(link => {
                link.setAttribute('rel', 'noopener noreferrer');
            });
        });
    </script>
</body>
</html>
